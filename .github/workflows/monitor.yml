name: Repo Monitor

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# 必须添加写权限，否则 git push 会失败
permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # 保证可以 push

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Get cached SHA
        id: cache-sha
        run: |
          # 确保文件不存在时不会报错，并存入 ENV
          if [ -f last_sha.txt ]; then
            echo "LAST_SHA=$(cat last_sha.txt)" >> $GITHUB_ENV
          else
            echo "LAST_SHA=none" >> $GITHUB_ENV
          fi

      - name: Run Monitor
        id: monitor
        env:
          LAST_SHA: ${{ env.LAST_SHA }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
        run: |
          # 运行脚本，脚本内部会负责写入 $GITHUB_OUTPUT
          python monitor.py

      - name: Update SHA record
        if: steps.monitor.outputs.NEW_COMMIT_DETECTED == 'true'
        run: |
          echo "${{ steps.monitor.outputs.COMMIT_SHA }}" > last_sha.txt
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add last_sha.txt
          git commit -m "Update last observed commit SHA: ${{ steps.monitor.outputs.COMMIT_SHA }}"
          git push
