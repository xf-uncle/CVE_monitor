name: Repo Monitor

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# 必须添加写权限，否则 git push 会失败
permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # 保证可以 push

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Get cached SHA
        id: cache-sha
        run: |
          # 确保文件不存在时不会报错，并存入 ENV
          if [ -f last_sha.txt ]; then
            echo "LAST_SHA=$(cat last_sha.txt)" >> $GITHUB_ENV
          else
            echo "LAST_SHA=none" >> $GITHUB_ENV
          fi

      - name: Run Monitor
        id: monitor
        env:
          MONITOR_REPOS: ${{ vars.MONITOR_REPOS }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
        run: python monitor.py

      - name: Update Record
        # 只要 Python 脚本输出了 ANY_UPDATED，就执行推送
        if: steps.monitor.outputs.ANY_UPDATED == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add last_sha.json
          git commit -m "chore: update last observed commit SHAs [skip ci]"
          git push
